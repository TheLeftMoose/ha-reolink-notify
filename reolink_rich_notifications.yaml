blueprint:
  name: Reolink Notify
  description: >
    Send rich notifications with camera images to mobile devices when
    Reolink sensors trigger. Supports Android and iOS via the Home Assistant
    mobile app. No snapshot files are saved to disk.

    iOS: single notification with a live camera entity attachment. Tapping
    opens the HA companion app to the default dashboard — iOS does not support
    opening a specific camera or entity from a notification tap.

    Android: single notification with the camera image fetched directly via
    the authenticated camera proxy. Tapping opens the camera feed.

    Web UI: optional persistent notification in the HA frontend with a live
    camera image. Each camera overwrites its own notification on retrigger.

    Version: 1.2.0
    Documentation: https://github.com/TheLeftMoose/ha-reolink-notify

  source_url: https://github.com/TheLeftMoose/ha-reolink-notify/blob/main/reolink_rich_notifications.yaml
  domain: automation
  input:
    notify_device_ios:
      name: iOS Devices to Notify
      description: Apple devices running the HA companion app.
      default: []
      selector:
        device:
          integration: mobile_app
          multiple: true

    notify_device_android:
      name: Android Devices to Notify
      description: Android devices running the HA companion app.
      default: []
      selector:
        device:
          integration: mobile_app
          multiple: true

    trigger_entities:
      name: Trigger Sensors
      description: Reolink binary sensors to monitor for alerts.
      selector:
        entity:
          multiple: true
          filter:
            - integration: reolink
              domain: binary_sensor

    notify_web_ui:
      name: Web UI Notification
      description: >
        Show a persistent notification in the Home Assistant frontend when an
        alert triggers. Each camera overwrites its own notification rather than
        creating new ones. Dismissed manually from the HA UI.
      default: false
      selector:
        boolean:

    retrigger_delay:
      name: Retrigger Delay
      description: Minimum time between notifications for the same camera.
      default:
        hours: 0
        minutes: 0
        seconds: 20
      selector:
        duration:

mode: parallel
max: 100

variables:
  notify_device_ios: !input notify_device_ios
  notify_device_android: !input notify_device_android
  notify_web_ui: !input notify_web_ui
  trigger_entities: !input trigger_entities
  retrigger_delay: !input retrigger_delay

trigger:
  - trigger: state
    entity_id: !input trigger_entities
    from: "off"
    to: "on"

action:
  - variables:
      camera_entities: >
        {{ device_entities(device_id(trigger.entity_id))
           | select('match', '^camera\.')
           | list }}
      camera_to_snapshot: >
        {{
          (camera_entities | select('match', '.*_snapshots_fluent$') | first)
          or (camera_entities | select('match', '.*_snapshots_clear$') | first)
          or (camera_entities | select('match', '.*_fluent$') | first)
          or (camera_entities | first)
        }}
      should_skip_notification: >
        {%
          set other_sensor_times =
            trigger_entities
            | select('ne', trigger.entity_id)
            | select('is_device_attr', 'id', device_id(trigger.entity_id))
            | expand
            | map(attribute='last_updated')
            | list
            + [trigger.from_state.last_updated]
        %}
        {{ trigger.to_state.last_updated - other_sensor_times | max < timedelta(**retrigger_delay) }}

  - if:
      - "{{ should_skip_notification }}"
    then:
      - stop: "Skipping notification — same camera triggered too recently."

  # Web UI: persistent notification in the HA frontend, overwrites previous
  # notification for the same camera via a stable notification_id.
  - if:
      - "{{ notify_web_ui }}"
    then:
      - action: persistent_notification.create
        data:
          title: "{{ trigger.to_state.attributes.friendly_name }}"
          message: "![Camera image](/api/camera_proxy/{{ camera_to_snapshot }})"
          notification_id: "reolink_notify_{{ camera_to_snapshot }}"

  # iOS: dynamic camera entity attachment, authenticated via companion app.
  # Tapping the notification opens the live camera feed in the HA app.
  - repeat:
      for_each: "{{ notify_device_ios }}"
      sequence:
        - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
          data:
            title: "{{ trigger.to_state.attributes.friendly_name }}"
            message: ""
            data:
              tag: "{{ trigger.to_state.context.id }}"
              ttl: 0
              priority: high
              entity_id: "{{ camera_to_snapshot }}"

  # Android: camera image fetched directly via authenticated camera proxy.
  # No snapshot file saved to disk.
  - repeat:
      for_each: "{{ notify_device_android }}"
      sequence:
        - action: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
          data:
            title: "{{ trigger.to_state.attributes.friendly_name }}"
            message: ""
            data:
              tag: "{{ trigger.to_state.context.id }}"
              ttl: 0
              priority: high
              image: "/api/camera_proxy/{{ camera_to_snapshot }}"
              clickAction: "entityId:{{ camera_to_snapshot }}"
